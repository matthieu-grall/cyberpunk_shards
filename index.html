<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="header.title">Shard Network Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>

  <!-- Loading overlay — inchangé -->
  <div id="loading-overlay" aria-live="polite">
    <p class="loading-label">Initialising shard network</p>
    <div class="loading-bar" role="progressbar"></div>
  </div>

  <div class="global_container">

    <!-- ============================================================
         HEADER — modèle DATA VISIONS
         Trois colonnes : logo | titre | drapeaux
    ============================================================ -->
    <header class="top_container">

      <div class="top_logo_div">
        <h1 data-i18n="header.logo">Data Visions</h1>
      </div>

      <div class="top_title_div">
        <h1 data-i18n="header.title">Shard Network Explorer</h1>
      </div>

      <div class="top_flags_div">
        <a href="#" class="language-toggle" data-lang="fr">
          <img src="img/fr.png" alt="FR" title="Français">
        </a>
        <a href="#" class="language-toggle" data-lang="en">
          <img src="img/en.png" alt="EN" title="English">
        </a>
      </div>

    </header>

    <!-- ============================================================
         CONTENT — app-shell directement dans le <main>
    ============================================================ -->
    <main class="content_container">

      <div class="app-shell">

        <!-- View row : onglets + recherche + contrôles -->
        <nav class="view-row" id="view-row" role="navigation" aria-label="Switch visualisation view">

          <div class="view-nav" id="view-nav">
            <!-- Buttons injected by ViewManager.renderNav()
                 puis retraduits à chaque changement de langue via languageChanged -->
          </div>

          <div class="view-actions">
            <div class="search-wrap" role="search" id="search-wrap">
              <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
                <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <input
                id="search-input"
                type="search"
                placeholder="Search entity, faction…"
                autocomplete="off"
                spellcheck="false"
                aria-label="Search entities"
              />
            </div>

            <div id="toolbar-right">
              <div class="stats-bar">
                <span><span class="stat-value" id="stat-nodes">—</span></span>
                <span><span class="stat-value" id="stat-links">—</span></span>
                <span><span class="stat-value" id="stat-communities">—</span></span>
              </div>
              <button id="btn-view-all" type="button">VIEW ALL</button>
              <button id="btn-reset"    type="button">RESET</button>
            </div>
          </div>

        </nav>

        <!-- View container — chaque vue monte son DOM ici -->
        <div id="view-container" role="main">
          <!-- Active view content rendered here -->
        </div>

      </div><!-- /.app-shell -->

    </main>

    <!-- ============================================================
         FOOTER — modèle DATA VISIONS
    ============================================================ -->
    <footer class="bottom_container">
      <div class="bottom_credits_div">
        <p>
          <span data-i18n="footer.project">Built from Cyberpunk 2077 shard data.</span>
          |
          <span data-i18n="footer.license">Site sous licence</span>
          <a href="http://creativecommons.org/licenses/by/4.0/deed.fr" target="_blank" rel="license noopener noreferrer">
            <span data-i18n="footer.cc">CC BY 4.0</span>
            <img class="license_icon" src="img/cc.svg" alt="CC">
            <img class="license_icon" src="img/by.svg" alt="BY">
          </a>
          |
          <span data-i18n="footer.flags">Drapeaux par</span>
          <a href="https://www.vecteezy.com/members/jayali-667571954" target="_blank" rel="noopener noreferrer">Jawad Ali</a>
          <span data-i18n="footer.flagsFrom">de</span>
          <a href="https://www.vecteezy.com/" target="_blank" rel="noopener noreferrer">VECTEEZY</a>
          |
          <span data-i18n="footer.background">Fond par</span>
          <a href="https://pixabay.com/fr/users/creativemagic-480360/" target="_blank" rel="noopener noreferrer">Magic Creative</a>
          <span data-i18n="footer.backgroundFrom">de</span>
          <a href="https://pixabay.com" target="_blank" rel="noopener noreferrer">PIXABAY</a>
        </p>
      </div>
    </footer>

  </div><!-- /.global_container -->

  <!-- ============================================================
       SCRIPTS
  ============================================================ -->

  <!-- i18n — doit être chargé avant les autres scripts -->
  <script src="./js/i18n.js"></script>

  <!-- Traduction des onglets après injection par ViewManager -->
  <script>
    document.addEventListener('languageChanged', () => {
      document.querySelectorAll('#view-nav .view-btn').forEach(btn => {
        const key = 'views.' + btn.dataset.viewId;
        const label = I18n.t(key);
        if (label && label !== key) btn.textContent = label;
      });
    });
  </script>

  <!-- D3 v7 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"
          integrity="sha512-M7nHCiNUOwFt6Us3r8alutZLm9qMt4s9951uo8jqO4UwJ1hziseL6O3ndFyigx6+LREfZqnhHxYjKRJ8ZQ69DQ=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <!-- Core modules -->
  <script src="./src/ui/view-manager.js"></script>
  <script src="./src/ui/ui-controller.js"></script>
  <script src="./src/graph/graph-builder.js"></script>
  <script src="./src/graph/graph-renderer.js"></script>

  <!-- View handlers -->
  <script src="./src/graph/view-network.js"></script>
  <script src="./src/timeline/view-timeline.js"></script>
  <script src="./src/clusters/view-clusters.js"></script>

  <!-- Bootstrap -->
  <script src="./src/main.js"></script>

  <!-- Toolbar visibility par vue — inchangé -->
  <script>
    document.getElementById("view-nav").addEventListener("click", (e) => {
      const btn = e.target.closest(".view-btn");
      if (!btn) return;
      const isNetwork = btn.dataset.viewId === "network";
      document.getElementById("search-wrap").style.display = isNetwork ? "" : "none";
      const statsBar   = document.querySelector(".stats-bar");
      const resetBtn   = document.getElementById("btn-reset");
      const viewAllBtn = document.getElementById("btn-view-all");
      if (statsBar)   statsBar.style.display   = isNetwork ? "" : "none";
      if (resetBtn)   resetBtn.style.display    = isNetwork ? "" : "none";
      if (viewAllBtn) viewAllBtn.style.display  = isNetwork ? "" : "none";
    });
  </script>

</body>
</html>
